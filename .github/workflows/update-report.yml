name: Update Merchant Review Report

on:
  schedule:
    - cron: '10 23 * * *'  # 9:10 AM AEST = 23:10 UTC previous day
  workflow_dispatch:

jobs:
  update-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Google API client
        run: pip install google-auth google-api-python-client --quiet

      - name: Fetch latest report from Drive
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python3 - << 'PYEOF'
          import json, os, io
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaIoBaseDownload

          creds = service_account.Credentials.from_service_account_info(
              json.loads(os.environ['GOOGLE_SA_JSON']),
              scopes=['https://www.googleapis.com/auth/drive.readonly']
          )
          drive = build('drive', 'v3', credentials=creds)

          # Find CU folder
          folders = drive.files().list(
              q="name='CU' and mimeType='application/vnd.google-apps.folder' and trashed=false",
              fields='files(id)'
          ).execute().get('files', [])
          if not folders:
              raise SystemExit('CU folder not found — share it with the service account')
          folder_id = folders[0]['id']
          print(f"CU folder ID: {folder_id}")

          # Find latest merchant_review file (no mimeType filter — handles plain HTML and Google Doc format)
          files = drive.files().list(
              q=f"'{folder_id}' in parents and name contains 'merchant_review' and trashed=false",
              orderBy='modifiedTime desc',
              pageSize=5,
              fields='files(id,name,mimeType,modifiedTime)'
          ).execute().get('files', [])
          if not files:
              raise SystemExit('No merchant_review file found in CU folder')

          for candidate in files:
              print(f"  Found: {candidate['name']} | {candidate['mimeType']} | modified: {candidate.get('modifiedTime','?')}")

          f = files[0]
          print(f"Using: {f['name']}")

          if f['mimeType'] == 'application/vnd.google-apps.document':
              req = drive.files().export_media(fileId=f['id'], mimeType='text/html')
          else:
              req = drive.files().get_media(fileId=f['id'])

          buf = io.BytesIO()
          dl = MediaIoBaseDownload(buf, req)
          done = False
          while not done:
              _, done = dl.next_chunk()
          content = buf.getvalue()
          with open('index.html', 'wb') as out:
              out.write(content)
          print(f"Saved index.html ({len(content)} bytes)")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          git diff --staged --quiet || git commit -m "Merchant Review update $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
